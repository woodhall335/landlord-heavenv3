# ============================================================================
# ENGLAND NOTICE ONLY - Master Question Set
# Post-1 May 2026 private rented possession flow
# ============================================================================

jurisdiction: england
legal_framework: "Housing Act 1988 / Renters' Rights Act 2025"
tenancy_type: "Assured periodic tenancy / assured tenancy in the private rented sector"

questions:
  # ========================================
  # BASIC INFORMATION
  # ========================================

  - id: landlord_details
    section: Landlord Details
    question: "Your details"
    inputType: group
    helperText: "We need your full details to complete the notice correctly."
    fields:
      - id: landlord_full_name
        label: "Full name"
        inputType: text
        validation:
          required: true
        width: full
      - id: landlord_address_line1
        label: "Address line 1"
        inputType: text
        validation:
          required: true
        width: full
      - id: landlord_address_line2
        label: "Address line 2 (optional)"
        inputType: text
        width: full
      - id: landlord_city
        label: "Town or city"
        inputType: text
        validation:
          required: true
        width: half
      - id: landlord_postcode
        label: "Postcode"
        inputType: text
        validation:
          required: true
        width: half
      # Telephone: Optional contact field for the Form 3A notice if provided
      - id: landlord_phone
        label: "Telephone (optional)"
        inputType: tel
        placeholder: "e.g. 020 1234 5678"
        width: half
        helperText: "Optional contact number for the notice form"
    maps_to:
      - landlord_full_name
      - landlord_address_line1
      - landlord_address_line2
      - landlord_city
      - landlord_postcode
      - landlord_phone

  # England post-1 May 2026: single possession route using Form 3A.
  - id: selected_notice_route
    section: Notice Type
    question: "England possession route"
    inputType: radio
    validation:
      required: true
    helperText: "England private rented possession notices now use Form 3A. Section 21 is not part of this flow."
    options:
      - value: "section_8"
        label: "Form 3A possession route"
        helperText: "Select possession grounds and generate the official Form 3A notice"
    width: full
    maps_to:
      - selected_notice_route

  - id: landlord_profile
    section: Landlord Details
    question: "Which landlord profile best fits this property?"
    inputType: select
    validation:
      required: true
    options:
      - value: "private_landlord"
        label: "Private landlord"
      - value: "supported_accommodation_provider"
        label: "Supported accommodation provider"
      - value: "employer_landlord"
        label: "Employer landlord"
      - value: "university_or_college"
        label: "University or college"
      - value: "agricultural_landlord"
        label: "Agricultural landlord"
      - value: "private_registered_provider"
        label: "Private registered provider"
      - value: "local_authority_owned_company"
        label: "Local authority owned company"
      - value: "minister_of_religion_housing"
        label: "Minister of religion housing"
    helperText: "Some Form 3A grounds only apply to specific landlord categories."
    maps_to:
      - landlord_profile

  - id: tenant_full_name
    section: Tenant Details
    question: "Tenant's full name"
    inputType: text
    validation:
      required: true
    maps_to:
      - tenant_full_name

  - id: property_details
    section: Property Details
    question: "Property address"
    inputType: group
    helperText: "The property this notice relates to"
    fields:
      - id: property_address_line1
        label: "Address line 1"
        inputType: text
        validation:
          required: true
        width: full
      - id: property_address_line2
        label: "Address line 2 (optional)"
        inputType: text
        width: full
      - id: property_city
        label: "Town or city"
        inputType: text
        validation:
          required: true
        width: half
      - id: property_postcode
        label: "Postcode"
        inputType: text
        validation:
          required: true
        width: half
    maps_to:
      - property_address_line1
      - property_address_line2
      - property_city
      - property_postcode

  - id: tenancy_start_date
    section: Tenancy Details
    question: "When did the tenancy start?"
    inputType: date
    validation:
      required: true
    maps_to:
      - tenancy_start_date

  - id: is_fixed_term
    section: Tenancy Details
    question: "Is this a fixed term tenancy?"
    inputType: yes_no
    validation:
      required: true
    helperText: "Fixed term has a specific end date (e.g., 12 months)"
    maps_to:
      - is_fixed_term

  - id: fixed_term_end_date
    section: Tenancy Details
    question: "Fixed term end date"
    inputType: date
    dependsOn:
      questionId: is_fixed_term
      value: true
    validation:
      required: true
    maps_to:
      - fixed_term_end_date

  # Break clause questions - allows earlier exit from fixed term
  - id: has_break_clause
    section: Tenancy Details
    question: "Does the tenancy have a break clause?"
    inputType: yes_no
    dependsOn:
      questionId: is_fixed_term
      value: true
    validation:
      required: true
    helperText: |
      A break clause allows landlord or tenant to end the fixed term early.
      If you have one, you may be able to serve notice before the fixed term ends.
    maps_to:
      - has_break_clause

  - id: break_clause_date
    section: Tenancy Details
    question: "Earliest break clause date"
    inputType: date
    dependsOn:
      questionId: has_break_clause
      value: true
    validation:
      required: true
    helperText: "The earliest date you can exercise the break clause (notice can expire on/after this date)"
    maps_to:
      - break_clause_date

  - id: rent_terms
    section: Rent Details
    question: "Rent details"
    inputType: group
    helperText: "We need this for the notice and arrears calculations"
    fields:
      - id: rent_amount
        label: "Rent amount"
        inputType: currency
        validation:
          required: true
          min: 0
        width: half
      - id: rent_frequency
        label: "Rent frequency"
        inputType: select
        options:
          - "weekly"
          - "monthly"
          - "quarterly"
          - "yearly"
        validation:
          required: true
        width: half
      - id: payment_date
        label: "Day of month rent is due"
        inputType: number
        helperText: "E.g., 1 for 1st, 15 for 15th"
        validation:
          required: true
          min: 1
          max: 31
        width: half
    maps_to:
      - rent_amount
      - rent_frequency
      - payment_date

  # ========================================
  # DEPOSIT & COMPLIANCE (TASK A: COLLECT FOR BOTH ROUTES)
  # ========================================

  - id: section21_intro
    section: Deposit & Compliance
    question: "Compliance Requirements"
    inputType: info
    content: |
      **Compliance requirements for eviction notices:**

      We'll check your compliance status. For England private rented possession claims
      served on or after 1 May 2026, deposit protection and prescribed information
      can still block the court from making a possession order on most grounds.

  - id: deposit_taken
    section: Deposit & Compliance
    question: "Did you take a deposit from the tenant?"
    inputType: yes_no
    validation:
      required: true
    helperText: "For post-1 May 2026 England possession claims, deposit protection can still block the court from making a possession order on most grounds unless the deposit issue has been resolved."
    maps_to:
      - deposit_taken

  - id: deposit_amount
    section: Deposit & Compliance
    question: "Deposit amount"
    inputType: currency
    dependsOn:
      questionId: deposit_taken
      value: true
    validation:
      required: true
      min: 0
    helperText: "The total deposit amount collected from the tenant. Required for compliance checking."
    maps_to:
      - deposit_amount

  # ========================================
  # DEPOSIT CAP - INLINE WARNING ONLY (NOT A WIZARD STEP)
  # ========================================
  # Deposit cap (Tenant Fees Act 2019) is enforced as an inline warning
  # on the deposit_amount step, not as a separate confirmation step.
  # The warning is computed and displayed by StructuredWizard.tsx.
  # evaluate-notice-compliance.ts computes cap values for messaging.
  # ========================================

  - id: has_gas_appliances
    section: Deposit & Compliance
    question: "Does the property have gas appliances?"
    inputType: yes_no
    routes:
      - section_21
    validation:
      required: true
    helperText: "This legacy Section 21 field is hidden from the post-1 May 2026 England possession flow."
    maps_to:
      - has_gas_appliances

  # ========================================
  # CONDITIONAL COMPLIANCE CHECKS
  # ========================================

  - id: deposit_protected_scheme
    section: Deposit & Compliance
    question: "Is the deposit protected in an approved scheme?"
    inputType: yes_no
    dependsOn:
      questionId: deposit_taken
      value: true
    validation:
      required: true
    helperText: |
      For post-1 May 2026 England possession claims, deposit protection can still block the court from making a possession order on most grounds unless the deposit issue has been resolved.

      Approved schemes:
      â€¢ Deposit Protection Service (DPS)
      â€¢ MyDeposits
      â€¢ Tenancy Deposit Scheme (TDS)
    maps_to:
      - deposit_protected

  # NEW: Collect actual deposit scheme name when deposit is protected
  - id: deposit_scheme_name
    section: Deposit & Compliance
    question: "Which deposit protection scheme was used?"
    inputType: select
    dependsOn:
      questionId: deposit_protected_scheme
      value: true
    validation:
      required: true
    helperText: "Select the government-approved scheme where the deposit is protected."
    options:
      - value: "DPS"
        label: "Deposit Protection Service (DPS)"
      - value: "MyDeposits"
        label: "MyDeposits"
      - value: "TDS"
        label: "Tenancy Deposit Scheme (TDS)"
    maps_to:
      - deposit_scheme

  # CRITICAL: Deposit protection dates for compliance verification
  - id: deposit_protection_dates
    section: Deposit & Compliance
    question: "Deposit protection dates"
    inputType: group
    dependsOn:
      questionId: deposit_protected_scheme
      value: true
    helperText: "CRITICAL: These dates verify compliance with the 30-day protection requirement."
    fields:
      - id: deposit_paid_date
        label: "Date deposit was paid by tenant"
        inputType: date
        helperText: "When did you receive the deposit?"
        validation:
          required: true
        width: half
      - id: deposit_protection_date
        label: "Date deposit was protected"
        inputType: date
        helperText: "MUST be within 30 days of receiving deposit"
        validation:
          required: true
        width: half
    maps_to:
      - deposit_paid_date
      - deposit_protection_date

  # CROSS-FIELD VALIDATION: Info panel explaining 30-day compliance timeline
  - id: deposit_compliance_timeline_info
    section: Deposit & Compliance
    question: "30-Day Compliance Timeline"
    inputType: info
    dependsOn:
      questionId: deposit_protected_scheme
      value: true
    content: |
      **Critical: 30-Day Deposit Compliance Timeline**

      From the date the deposit was **paid by tenant**, you must:

      1. **Protect the deposit** in approved scheme (within 30 days)
      2. **Serve prescribed information** (within 30 days)

      **Example timeline:**
      - Deposit paid: 1st January
      - Protection deadline: 31st January
      - Prescribed info deadline: 31st January

      **If either deadline is missed, the court will usually be unable to make a possession order on most Form 3A grounds unless the deposit has been returned or otherwise resolved.**

      The system will validate these dates when generating documents.

  # UPDATED: prescribed_info_given now depends on BOTH deposit_taken AND deposit_protected_scheme
  # Prescribed information can only be given if the deposit was first protected in an approved scheme
  - id: prescribed_info_given
    section: Deposit & Compliance
    question: "Was prescribed information given within 30 days?"
    inputType: yes_no
    dependsOn:
      allOf:
        - questionId: deposit_taken
          value: true
        - questionId: deposit_protected_scheme
          value: true
    validation:
      required: true
    helperText: "Prescribed information about the deposit protection scheme. For post-1 May 2026 England possession claims, missing prescribed information can still block the court from making a possession order on most grounds unless the deposit issue has been resolved."
    maps_to:
      - prescribed_info_given

  # CRITICAL: Prescribed info date for post-1 May 2026 deposit compliance
  - id: prescribed_info_served_date
    section: Deposit & Compliance
    question: "When was prescribed information served?"
    inputType: date
    dependsOn:
      allOf:
        - questionId: prescribed_info_given
          value: true
        - questionId: deposit_protected_scheme
          value: true
    validation:
      required: true
    helperText: |
      Critical for most post-1 May 2026 England possession grounds: this should normally be served within 30 days of receiving the deposit.

      **The court will usually refuse possession on most grounds if:**
      - Prescribed info served more than 30 days after deposit received
      - Prescribed info never served

      **Tip:** This date should be between deposit_paid_date and deposit_paid_date + 30 days.
    maps_to:
      - prescribed_info_date

  - id: gas_safety_certificate
    section: Deposit & Compliance
    question: "Was a valid gas safety certificate provided?"
    inputType: yes_no
    routes:
      - section_21
    dependsOn:
      questionId: has_gas_appliances
      value: true
    validation:
      required: true
    helperText: "This is not a Form 3A validity requirement and is hidden from the post-1 May 2026 England possession flow."
    maps_to:
      - gas_certificate_provided

  # ========================================
  # EPC (CLAUDE CODE FIX #6 - EXPLICIT PRODUCT CONSTRAINT)
  # ========================================

  - id: epc_provided
    section: Deposit & Compliance
    question: "Was an EPC provided before tenancy started?"
    inputType: yes_no
    routes:
      - section_21
    validation:
      required: true
    helperText: |
      Energy Performance Certificate (EPC) must be provided to tenants.

      This is a legal requirement for Section 21 notices.

      **Legal exemptions exist but are not supported:**
      â€¢ Listed buildings
      â€¢ Buildings to be demolished
      â€¢ Temporary structures
      â€¢ Certain holiday accommodations

      **If you believe your property is EPC exempt:**
      Consult a solicitor for manual preparation.
    maps_to:
      - epc_provided

  # ========================================
  # HOW TO RENT (CLAUDE CODE FIX #5 - OPTIONAL, API-ENFORCED)
  # ========================================

  - id: how_to_rent_info
    section: Deposit & Compliance
    question: "How to Rent Guide"
    inputType: info
    routes:
      - section_21
    content: |
      **How to Rent guide requirement:**

      System automatically determines if required based on
      tenancy start date.

      â€¢ Before Oct 1, 2015: Not required
      â€¢ On or after Oct 1, 2015: Required (for Section 21)

      **System calculates requirement automatically.**

  - id: how_to_rent_provided
    section: Deposit & Compliance
    question: "Was the 'How to Rent' guide provided?"
    inputType: yes_no
    routes:
      - section_21
    validation:
      required: false  # Not required in UI, enforced in API for Section 21
    helperText: |
      Answer based on whether you provided the guide.
      **System checks if it was required for your tenancy start date.**
    maps_to:
      - how_to_rent_provided

  - id: property_licensing
    section: Deposit & Compliance
    question: "Property licensing status"
    inputType: select
    routes:
      - section_21
    validation:
      required: true
    options:
      - "not_required"
      - "licensed"
      - "unlicensed"
    helperText: "HMO or selective licensing status. If required and unlicensed, Section 21 notices cannot be served."
    maps_to:
      - property_licensing_status

  - id: recent_repair_complaints_s21
    section: Deposit & Compliance
    question: "Has tenant made repair complaints in last 6 months?"
    inputType: yes_no
    routes:
      - section_21
    validation:
      required: true
    helperText: "Retaliatory eviction rules may apply to Section 21 notices if tenant has made recent repair complaints."
    maps_to:
      - recent_repair_complaints

  # ============================================================
  # COMPLIANCE CERTIFICATE DATES
  # ============================================================

  - id: compliance_dates
    section: Compliance Certificates
    question: "Compliance certificate dates"
    inputType: group
    helperText: "Provide dates for your compliance certificates. This helps verify they were valid when required."
    fields:
      - id: gas_cert_date
        label: "Gas safety certificate date"
        inputType: date
        helperText: "Date of most recent gas safety certificate"
        width: half
        dependsOn:
          fieldId: has_gas_appliances
          value: true
      - id: gas_cert_expiry
        label: "Gas certificate expiry date"
        inputType: date
        helperText: "Expires 12 months after issue"
        width: half
        dependsOn:
          fieldId: has_gas_appliances
          value: true
      - id: epc_certificate_date
        label: "EPC date"
        inputType: date
        helperText: "Energy Performance Certificate date"
        width: half
      - id: eicr_provided
        label: "Was an EICR provided?"
        inputType: yes_no
        helperText: "Electrical Installation Condition Report - required since April 2021"
        width: half
      - id: eicr_date
        label: "EICR date"
        inputType: date
        helperText: "Date of electrical safety report"
        width: half
        dependsOn:
          fieldId: eicr_provided
          value: true
      - id: how_to_rent_date
        label: "How to Rent guide provided date"
        inputType: date
        helperText: "Date the How to Rent guide was given to tenant"
        width: half
      - id: prescribed_info_date
        label: "Deposit prescribed info date"
        inputType: date
        helperText: "Date prescribed information was served"
        width: half
    maps_to:
      - compliance.gas_cert_date
      - compliance.gas_cert_expiry
      - compliance.epc_certificate_date
      - compliance.eicr_provided
      - compliance.eicr_date
      - compliance.how_to_rent_date
      - compliance.prescribed_info_date

  # ============================================================
  # RISK INDICATORS
  # ============================================================

  - id: risk_indicators
    section: Risk Assessment
    question: "Risk factors"
    inputType: group
    helperText: "This information helps identify potential issues with your notice."
    fields:
      - id: disrepair_complaint_date
        label: "Date of any disrepair complaint"
        inputType: date
        helperText: "CRITICAL: Section 21 invalid if served within 6 months of complaint to council"
        width: half
        dependsOn:
          fieldId: recent_repair_complaints_s21
          value: true
      - id: disrepair_issues_list
        label: "List the disrepair issues"
        inputType: textarea
        helperText: "What repairs did the tenant complain about?"
        width: full
        dependsOn:
          fieldId: recent_repair_complaints_s21
          value: true
      - id: previous_court_proceedings
        label: "Previous court proceedings about this tenancy?"
        inputType: yes_no
        width: half
      - id: previous_proceedings_details
        label: "Previous proceedings details"
        inputType: textarea
        helperText: "Dates, case numbers, outcomes"
        width: full
        dependsOn:
          fieldId: previous_court_proceedings
          value: true
      - id: tenant_vulnerability
        label: "Are you aware of any tenant vulnerabilities?"
        inputType: yes_no
        helperText: "E.g., elderly, disabled, mental health issues, children"
        width: half
      - id: tenant_vulnerability_details
        label: "Vulnerability details"
        inputType: textarea
        helperText: "Courts may consider this when deciding reasonableness"
        width: full
        dependsOn:
          fieldId: tenant_vulnerability
          value: true
    maps_to:
      - risk.disrepair_complaint_date
      - risk.disrepair_issues_list
      - risk.previous_court_proceedings
      - risk.previous_proceedings_details
      - risk.tenant_vulnerability
      - risk.tenant_vulnerability_details

  # ========================================
  # SECTION 8 ARREARS DETAILS (CRITICAL FOR GROUND 8 VALIDATION)
  # ========================================

  - id: has_rent_arrears
    section: Section 8 Grounds
    question: "Are there currently any rent arrears?"
    inputType: yes_no
    dependsOn:
      questionId: selected_notice_route
      value: section_8
    validation:
      required: true
    helperText: "Select 'Yes' if the tenant owes any unpaid rent. This is required to validate Ground 8, 10, or 11."
    maps_to:
      - has_rent_arrears

  - id: arrears_details
    section: Section 8 Grounds
    question: "Arrears details"
    inputType: group
    dependsOn:
      questionId: has_rent_arrears
      value: true
    validation:
      required: true
    helperText: "We need these details to validate Ground 8 (mandatory) threshold and calculate notice periods."
    fields:
      - id: arrears_total
        label: "Total arrears amount (Â£)"
        inputType: currency
        validation:
          required: true
          min: 0
        width: half
        helperText: "Total amount of rent currently owed"
      - id: arrears_from_date
        label: "Arrears started from (optional)"
        inputType: date
        width: half
        helperText: "When did arrears first start accruing?"
    maps_to:
      - arrears_total
      - arrears_from_date

  # ========================================
  # FORM 3A POSSESSION GROUNDS (must come BEFORE notice_service for proper flow)
  # ========================================

  # Ground selection fetches all available grounds from API (config/jurisdictions/uk/england/grounds/)
  # No static options needed - UI loads complete ground list with descriptions
  - id: section8_grounds_selection
    section: Possession Grounds
    question: "Select the possession grounds you want to rely on"
    inputType: multi_select
    dependsOn:
      questionId: selected_notice_route
      value: section_8
    validation:
      required: true
    helperText: "Select all Form 3A grounds that apply. The pack will calculate the longest notice period automatically."
    maps_to:
      - section8_grounds
      - selected_grounds

  - id: ground14_severity
    section: Section 8 Grounds
    question: "How severe is the antisocial behaviour?"
    inputType: select
    dependsOn:
      questionId: section8_grounds_selection
      valueContains: "Ground 14"
    validation:
      required: true
    options:
      - value: "serious"
        label: "Serious (violence, threats, drug dealing)"
      - value: "moderate"
        label: "Moderate (noise, minor nuisance)"
    maps_to:
      - ground14_severity

  - id: ground_particulars
    section: Possession Grounds
    question: "Provide specific details for each ground selected"
    inputType: textarea
    dependsOn:
      questionId: selected_notice_route
      value: section_8
    validation:
      required: true
    helperText: "For each ground, provide dates, amounts, incidents, prerequisites, and evidence. This will feed Form 3A question 4.3."
    suggestion_prompt: >
      Draft clear, factual particulars for Form 3A. For each ground selected, provide:
      - Dates when incidents occurred or breaches started
      - Amounts (if rent arrears)
      - Any prior notice or tenancy-start warning relied on
      - Specific examples and evidence
      - Witnesses or documentation available
      Keep professional and court-ready. Focus on facts, not opinions.
    maps_to:
      - ground_particulars
      - section_8_particulars

  - id: ground_prerequisite_notice_served
    section: Possession Grounds
    question: "If any selected ground depends on prior written notice or tenancy-start wording, have you already given that notice?"
    inputType: radio
    dependsOn:
      questionId: selected_notice_route
      value: section_8
    validation:
      required: true
    options:
      - value: true
        label: "Yes"
      - value: false
        label: "No"
    helperText: "Some grounds such as student or specialist accommodation routes depend on prior written notice."
    maps_to:
      - ground_prerequisite_notice_served

  - id: section_16e_duties_checked
    section: Possession Compliance
    question: "Have you complied with the landlord duties required by section 16E before seeking possession?"
    inputType: yes_no
    dependsOn:
      questionId: selected_notice_route
      value: section_8
    validation:
      required: true
    helperText: "This is a post-1 May 2026 England possession requirement. The system will not let you proceed unless you confirm this."
    maps_to:
      - section_16e_duties_checked

  - id: breathing_space_checked
    section: Possession Compliance
    question: "Have you checked whether the tenant is in a Debt Respite Scheme breathing space?"
    inputType: yes_no
    dependsOn:
      questionId: selected_notice_route
      value: section_8
    validation:
      required: true
    helperText: "Check before serving the notice and again before filing at court."
    maps_to:
      - breathing_space_checked

  - id: tenant_in_breathing_space
    section: Possession Compliance
    question: "Is the tenant currently in an active breathing space?"
    inputType: yes_no
    dependsOn:
      questionId: breathing_space_checked
      value: true
    validation:
      required: true
    helperText: "If yes, the system will block service or filing until the breathing space restriction no longer applies."
    maps_to:
      - tenant_in_breathing_space

  - id: evidence_bundle_ready
    section: Possession Compliance
    question: "Have you gathered the core evidence for every selected ground?"
    inputType: yes_no
    dependsOn:
      questionId: selected_notice_route
      value: section_8
    validation:
      required: true
    helperText: "For example: arrears schedule, sale evidence, prior notice evidence, photographs, witness evidence, or tenancy-breach records."
    maps_to:
      - evidence_bundle_ready

  - id: ground_1a_reletting_acknowledged
    section: Possession Compliance
    question: "If you recover possession on Ground 1A, do you understand the 12-month re-letting restriction?"
    inputType: yes_no
    dependsOn:
      questionId: section8_grounds_selection
      contains: Ground 1A
    validation:
      required: true
    helperText: "This does not stop you serving notice, but the landlord should understand the post-possession restriction and keep sale evidence."
    maps_to:
      - ground_1a_reletting_acknowledged

  - id: notice_strategy
    section: Section 8 Grounds
    question: "Notice period strategy"
    inputType: select
    dependsOn:
      questionId: selected_notice_route
      value: section_8
    validation:
      required: true
    options:
      - value: "minimum"
        label: "Minimum legal period (ground-dependent under the post-2026 Form 3A rules)"
      - value: "recommended"
        label: "Recommended period with extra buffer"
    helperText: "Notice period depends on the selected Form 3A grounds. The longest statutory notice period among your chosen grounds controls the notice."
    maps_to:
      - notice_strategy

  # ========================================
  # NOTICE SERVICE + EXPIRY (comes AFTER grounds for Section 8)
  # ========================================
  # CRITICAL FIX (Jan 2026): Field IDs MUST match the last segment of maps_to paths
  # for the mapping.ts applyMappedAnswers() function to correctly extract values.
  # Old field IDs like "notice_service_date" didn't match maps_to "notice_service.notice_date"
  # which caused values to be silently dropped.
  # ========================================

  - id: notice_service
    section: Notice Details
    question: "Notice service and expiry"
    inputType: group
    dependsOn:
      anyOf:
        - questionId: selected_notice_route
          value: section_8
        - questionId: selected_notice_route
          value: section_21
    helperText: "We need these dates to calculate the minimum notice period and check statutory bars."
    fields:
      # FIXED: Field ID "notice_date" now matches maps_to "notice_service.notice_date"
      - id: notice_date
        label: "Date you will serve the notice*"
        inputType: date
        validation:
          required: true
        helperText: "This is the date you will actually serve (hand deliver or post) the notice to the tenant."
      # Section 8 ONLY: User can input expiry date (grounds-driven, strategy-driven)
      - id: notice_expiry_date
        label: "Date the notice should expire"
        inputType: date
        routes:
          - section_8
        validation:
          required: false
        helperText: "Will be auto-calculated based on your grounds and service date. You can override if needed."
      - id: service_method
        label: "How will you serve the notice?"
        inputType: select
        options: ["Post", "By hand", "Email (agreed)", "Other"]
        validation:
          required: true
      - id: serving_capacity
        label: "In what capacity will you serve the notice?"
        inputType: select
        options:
          - label: "Landlord"
            value: "landlord"
          - label: "Joint landlord(s)"
            value: "joint_landlords"
          - label: "Landlord's agent / representative"
            value: "agent"
        validation:
          required: true
        helperText: "Select who will be signing and serving the notice"
      - id: served_by
        label: "Name of person serving"
        inputType: text
        helperText: "Enter the name of the person who will serve the notice"
    maps_to:
      - notice_service.notice_date
      - notice_service.notice_expiry_date
      - notice_service.service_method
      - notice_service.serving_capacity
      - notice_service.served_by

  # Section 21 ONLY: Computed expiry date (read-only display)
  # This shows the auto-calculated expiry date based on tenancy terms and service date
  - id: s21_calculated_expiry_info
    section: Notice Details
    question: "Calculated notice expiry date"
    inputType: info
    routes:
      - section_21
    dependsOn:
      questionId: selected_notice_route
      value: section_21
    content: |
      **Your Section 21 notice expiry date will be calculated automatically** based on:

      â€¢ Your service date (entered above)
      â€¢ Whether tenancy is fixed term or periodic
      â€¢ Fixed term end date (if applicable)
      â€¢ Break clause date (if applicable)
      â€¢ The 4-month restriction from tenancy start

      The system ensures compliance with Housing Act 1988, Section 21(4) requirements
      (minimum 2 calendar months notice, cannot expire before fixed term ends, etc.)

      **You will see the calculated expiry date on the generated Form 6A.**

