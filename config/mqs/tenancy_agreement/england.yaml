      value: "Premium Assured Periodic Tenancy Agreement"
    helperText: "Define expected cleaning standards during and at end of tenancy without requiring a paid professional service in every case."
    fields:
      - id: regular_cleaning_expectations
        label: "Regular cleaning expectations"
        inputType: textarea
        placeholder: "e.g., Keep property in clean and habitable condition, regular vacuuming, bathroom cleaning..."
        validation:
          required: true
        width: full
      - id: deep_cleaning_areas
        label: "Areas requiring deep cleaning at checkout"
        inputType: multiselect
        options:
          - "Kitchen appliances (oven, hob, extractor)"
          - "Bathrooms (tiles, grout, fixtures)"
          - "Windows (inside and out)"
          - "Carpets (specialist clean if needed)"
          - "Hard floors (specialist clean if needed)"
          - "Curtains/blinds"
          - "Skirting boards and doors"
        width: full
      - id: cleaning_checklist_provided
        label: "Detailed cleaning checklist provided?"
        inputType: yes_no
        validation:
          required: true
        width: half
      - id: cleaning_cost_estimates
        label: "Estimated professional cleaning costs (£)"
        inputType: number
        placeholder: "e.g., 250"
        helperText: "For the tenant's reference only if they choose to arrange optional specialist cleaning."
        width: half
    maps_to:
      - regular_cleaning_expectations
      - deep_cleaning_areas
      - cleaning_checklist_provided
      - cleaning_cost_estimates

