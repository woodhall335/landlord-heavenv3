# config/mqs/tenancy_agreement/england.yaml
#
# ENGLAND-ONLY Assured Periodic Tenancy Agreement
# Split from england-wales.yaml as part of canonical jurisdiction implementation
# Version 2.0.2 - England jurisdiction

__meta:
  version: "2.0.2"
  effective_from: "2025-12-16"
  last_updated: "2025-12-16"
  legal_review_date: "2025-12-16"
  jurisdiction: "england"
  product: "tenancy_agreement"

# Audit Notes (2025-12-16)
# - Split from england-wales.yaml to support canonical jurisdictions
# - Removed Wales-specific content (Rent Smart Wales, Section 173 references)
# - Updated for Renters' Rights Act 2025 England tenancy wording

id: tenancy_agreement_england_v2
product: tenancy_agreement
jurisdiction: england
version: "2.0.2"

questions:
  # 0. Product selection
  - id: ast_tier
    section: Product
    question: "Which tenancy agreement do you need?"
    inputType: select
    options:
      - "Standard Assured Periodic Tenancy Agreement"
      - "Premium Assured Periodic Tenancy Agreement"
    helperText: "Standard covers straightforward England lets. Premium adds HMO, student, guarantor, section 13 rent increase guidance and tighter control clauses."
    validation:
      required: true
    maps_to:
      - product_tier

  # 1. England tenancy purpose
  - id: england_tenancy_purpose
    section: "Tenancy Type Check"
    question: "What are you doing today?"
    inputType: select
    options:
      - "new_agreement"
      - "existing_written_tenancy"
      - "existing_verbal_tenancy"
    helperText: "Use the new agreement flow for a fresh England Assured Periodic Tenancy Agreement. Existing written tenancies usually auto-roll on 1 May 2026 and need transition information rather than a full replacement."
    validation:
      required: true
    maps_to:
      - england_tenancy_purpose

  # 2. Property details
  - id: property_address
    section: Property Details
    question: "Rental property address"
    inputType: group
    helperText: "Exactly as it should appear in the tenancy agreement."
    fields:
      - id: property_address_line1
        label: "Building and street"
        inputType: text
        placeholder: "123 High Street"
        validation:
          required: true
        width: full
      - id: property_address_town
        label: "Town / City"
        inputType: text
        placeholder: "London"
        validation:
          required: true
        width: half
      - id: property_address_postcode
        label: "Postcode"
        inputType: text
        placeholder: "SW1A 1AA"
        validation:
          required: true
        width: half
    maps_to:
      - property_address_line1
      - property_address_town
      - property_address_postcode

  - id: property_overview
    section: Property Details
    question: "Property overview"
    inputType: group
    helperText: "Type, bedrooms and whether it's furnished."
    fields:
      - id: property_type
        label: "Property type"
        inputType: select
        options:
          - "house"
          - "flat"
          - "maisonette"
          - "bungalow"
          - "studio"
        validation:
          required: true
        width: half
      - id: number_of_bedrooms
        label: "Number of bedrooms"
        inputType: number
        validation:
          required: true
          min: 0
          max: 20
        width: half
      - id: furnished_status
        label: "Furnishing"
        inputType: select
        options:
          - "furnished"
          - "part-furnished"
          - "unfurnished"
        validation:
          required: true
        width: half
      - id: parking_available
        label: "Is parking included?"
        inputType: yes_no
        validation:
          required: true
        width: half
      - id: parking_details
        label: "Parking details"
        inputType: text
        placeholder: "Allocated bay, permit required, on-street, etc."
        dependsOn:
          questionId: parking_available
          value: true
        width: full
    maps_to:
      - property_type
      - number_of_bedrooms
      - furnished_status
      - parking_available
      - parking_details

  - id: outdoor_space
    section: Property Details
    question: "Outdoor space"
    inputType: group
    helperText: "Garden and maintenance arrangements"
    fields:
      - id: has_garden
        label: "Is there a garden or outdoor space?"
        inputType: yes_no
        validation:
          required: true
        width: half
      - id: garden_maintenance
        label: "Who maintains the garden?"
        inputType: select
        options:
          - "Tenant"
          - "Landlord"
          - "Shared responsibility"
        dependsOn:
          questionId: has_garden
          value: true
        width: half
    maps_to:
      - has_garden
      - garden_maintenance

  # 2. Landlord details
  - id: landlord_details
    section: Landlord Details
    question: "Landlord contact details"
    inputType: group
    helperText: "Used on the Assured Periodic Tenancy Agreement, checklist and notices."
    fields:
      - id: landlord_full_name
        label: "Full name"
        inputType: text
        placeholder: "Jane Landlord"
        validation:
          required: true
        width: full
      - id: landlord_email
        label: "Email"
        inputType: email
        placeholder: "you@example.com"
        validation:
          required: true
        width: half
      - id: landlord_phone
        label: "Phone"
        inputType: tel
        placeholder: "07700 900000"
        validation:
          required: true
        width: half
    maps_to:
      - landlord_full_name
      - landlord_email
      - landlord_phone

  - id: landlord_address
    section: Landlord Details
    question: "Landlord service address"
    inputType: group
    helperText: "Where formal notices can be served (not the rental property)."
    fields:
      - id: landlord_address_line1
        label: "Building and street"
        inputType: text
        placeholder: "456 Park Avenue"
        validation:
          required: true
        width: full
      - id: landlord_address_town
        label: "Town / City"
        inputType: text
        placeholder: "London"
        validation:
          required: true
        width: half
      - id: landlord_address_postcode
        label: "Postcode"
        inputType: text
        placeholder: "W1A 2BB"
        validation:
          required: true
        width: half
    maps_to:
      - landlord_address_line1
      - landlord_address_town
      - landlord_address_postcode

  - id: agent_usage
    section: Landlord Details
    question: "Are you using a letting agent?"
    inputType: yes_no
    helperText: "If yes, their details can appear on the Assured Periodic Tenancy Agreement for rent collection and management."
    validation:
      required: true
    maps_to:
      - agent_usage

  - id: agent_details
    section: Landlord Details
    question: "Agent details"
    inputType: group
    dependsOn:
      questionId: agent_usage
      value: true
    fields:
      - id: agent_name
        label: "Agent name"
        inputType: text
        placeholder: "Acme Lettings"
        validation:
          required: true
        width: full
      - id: agent_address
        label: "Agent address"
        inputType: textarea
        placeholder: "Building and street\nTown/City\nPostcode"
        validation:
          required: true
        width: full
      - id: agent_email
        label: "Agent email"
        inputType: email
        placeholder: "agent@example.com"
        validation:
          required: true
        width: half
      - id: agent_phone
        label: "Agent phone"
        inputType: tel
        placeholder: "0207 123 4567"
        validation:
          required: true
        width: half
      - id: agent_signs
        label: "Should the agent sign on your behalf?"
        inputType: yes_no
        validation:
          required: true
        width: half
    maps_to:
      - agent_name
      - agent_address
      - agent_email
      - agent_phone
      - agent_signs

  # 3. Tenants
  - id: number_of_tenants
    section: Tenants
    question: "How many tenants are on the agreement?"
    inputType: select
    options:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
    validation:
      required: true
    maps_to:
      - number_of_tenants

  - id: tenant_1
    section: Tenants
    question: "Lead tenant"
    inputType: group
    helperText: "Primary tenant who will receive notices"
    fields:
      - id: full_name
        label: "Full name"
        inputType: text
        validation:
          required: true
        width: full
      - id: dob
        label: "Date of birth"
        inputType: date
        validation:
          required: true
        width: half
      - id: email
        label: "Email"
        inputType: email
        validation:
          required: true
        width: half
      - id: phone
        label: "Phone"
        inputType: tel
        validation:
          required: true
        width: half
    maps_to:
      - tenants.0.full_name
      - tenants.0.dob
      - tenants.0.email
      - tenants.0.phone

  - id: tenant_2
    section: Tenants
    question: "Tenant 2"
    inputType: group
    dependsOn:
      questionId: number_of_tenants
      value: ["2", "3", "4", "5"]
    fields:
      - id: full_name
        label: "Full name"
        inputType: text
        validation:
          required: true
        width: full
      - id: dob
        label: "Date of birth"
        inputType: date
        validation:
          required: true
        width: half
      - id: email
        label: "Email"
        inputType: email
        validation:
          required: true
        width: half
      - id: phone
        label: "Phone"
        inputType: tel
        validation:
          required: true
        width: half
    maps_to:
      - tenants.1.full_name
      - tenants.1.dob
      - tenants.1.email
      - tenants.1.phone

  - id: tenant_3
    section: Tenants
    question: "Tenant 3"
    inputType: group
    dependsOn:
      questionId: number_of_tenants
      value: ["3", "4", "5"]
    fields:
      - id: full_name
        label: "Full name"
        inputType: text
        validation:
          required: true
        width: full
      - id: dob
        label: "Date of birth"
        inputType: date
        validation:
          required: true
        width: half
      - id: email
        label: "Email"
        inputType: email
        validation:
          required: true
        width: half
      - id: phone
        label: "Phone"
        inputType: tel
        validation:
          required: true
        width: half
    maps_to:
      - tenants.2.full_name
      - tenants.2.dob
      - tenants.2.email
      - tenants.2.phone

  - id: tenant_4
    section: Tenants
    question: "Tenant 4"
    inputType: group
    dependsOn:
      questionId: number_of_tenants
      value: ["4", "5"]
    fields:
      - id: full_name
        label: "Full name"
        inputType: text
        validation:
          required: true
        width: full
      - id: dob
        label: "Date of birth"
        inputType: date
        validation:
          required: true
        width: half
      - id: email
        label: "Email"
        inputType: email
        validation:
          required: true
        width: half
      - id: phone
        label: "Phone"
        inputType: tel
        validation:
          required: true
        width: half
    maps_to:
      - tenants.3.full_name
      - tenants.3.dob
      - tenants.3.email
      - tenants.3.phone

  - id: tenant_5
    section: Tenants
    question: "Tenant 5"
    inputType: group
    dependsOn:
      questionId: number_of_tenants
      value: ["5"]
    fields:
      - id: full_name
        label: "Full name"
        inputType: text
        validation:
          required: true
        width: full
      - id: dob
        label: "Date of birth"
        inputType: date
        validation:
          required: true
        width: half
      - id: email
        label: "Email"
        inputType: email
        validation:
          required: true
        width: half
      - id: phone
        label: "Phone"
        inputType: tel
        validation:
          required: true
        width: half
    maps_to:
      - tenants.4.full_name
      - tenants.4.dob
      - tenants.4.email
      - tenants.4.phone

  # 4. Tenancy type & dates
  - id: tenancy_type_and_dates
    section: Tenancy
    question: "Tenancy start and structure"
    inputType: group
    helperText: "New England self-serve agreements are created as upgraded assured periodic residential tenancies."
    fields:
      - id: tenancy_start_date
        label: "Start date"
        inputType: date
        validation:
          required: true
        width: half
      - id: tenant_notice_period
        label: "Tenant notice period"
        inputType: select
        options:
          - "2 months"
          - "1 month"
          - "6 weeks"
        validation:
          required: true
        width: half
      - id: existing_written_tenancy_transition
        label: "Existing written tenancy: will you give every named tenant the exact 'Renters' Rights Act Information Sheet 2026' PDF by 31 May 2026?"
        inputType: yes_no
        helperText: "Choose Yes only if you will provide the exact local PDF to every named tenant for the pre-1 May 2026 written tenancy transition."
        dependsOn:
          questionId: england_tenancy_purpose
          value: "existing_written_tenancy"
        validation:
          required: true
        width: full
      - id: existing_verbal_tenancy_summary
        label: "Existing verbal tenancy: will you give the tenant the required written information about the key terms by 31 May 2026?"
        inputType: yes_no
        helperText: "Choose Yes only if you will provide the written information needed for the pre-1 May 2026 verbal tenancy transition."
        dependsOn:
          questionId: england_tenancy_purpose
          value: "existing_verbal_tenancy"
        validation:
          required: true
        width: full
      - id: tenancy_regime_confirmation
        label: "England tenancy structure"
        inputType: select
        options:
          - "Assured periodic residential tenancy"
        validation:
          required: true
        width: full
    maps_to:
      - tenancy_start_date
      - tenant_notice_period
      - existing_written_tenancy_transition
      - existing_verbal_tenancy_summary
      - tenancy_regime_confirmation

  # 5. Rent & payment details
  - id: rent_details
    section: Rent & Payments
    question: "Rent schedule"
    inputType: group
    helperText: "We include this in the rent clause and summary schedule."
    fields:
      - id: rent_amount
        label: "Rent amount"
        inputType: currency
        placeholder: "1200"
        validation:
          required: true
          min: 1
        width: half
      - id: rent_period
        label: "Rent period"
        inputType: select
        options:
          - "month"
          - "week"
          - "quarter"
          - "year"
        validation:
          required: true
        width: half
      - id: rent_due_day
        label: "Payment due day"
        inputType: select
        options:
          - "1st"
          - "2nd"
          - "3rd"
          - "4th"
          - "5th"
          - "6th"
          - "7th"
          - "8th"
          - "9th"
          - "10th"
          - "11th"
          - "12th"
          - "13th"
          - "14th"
          - "15th"
          - "16th"
          - "17th"
          - "18th"
          - "19th"
          - "20th"
          - "21st"
          - "22nd"
          - "23rd"
          - "24th"
          - "25th"
          - "26th"
          - "27th"
          - "28th"
          - "29th"
          - "30th"
          - "Last day of month"
        validation:
          required: true
        width: half
      - id: payment_method
        label: "Preferred payment method"
        inputType: select
        options:
          - "Standing Order"
          - "Bank Transfer"
          - "Cash"
        validation:
          required: true
        width: half
      - id: payment_details
        label: "Payment details"
        inputType: textarea
        placeholder: "Payment reference"
        validation:
          required: true
        width: full
      - id: bank_account_name
        label: "Account name"
        inputType: text
        width: half
      - id: bank_sort_code
        label: "Sort code"
        inputType: text
        placeholder: "12-34-56"
        width: half
      - id: bank_account_number
        label: "Account number"
        inputType: text
        placeholder: "12345678"
        width: half
    maps_to:
      - rent_amount
      - rent_period
      - rent_due_day
      - payment_method
      - payment_details
      - bank_account_name
      - bank_sort_code
      - bank_account_number

  # 6. Deposit
  - id: deposit_details
    section: Deposit
    question: "Deposit and protection"
    inputType: group
    helperText: "We include the deposit limit warning and scheme certificate."
    fields:
      - id: deposit_amount
        label: "Deposit amount"
        inputType: currency
        placeholder: "1400"
        helperText: "⚠️ TENANT FEES ACT 2019: Maximum deposit is 5 weeks' rent (or 6 weeks if annual rent exceeds £50,000). Excess deposits are unlawful."
        validation:
          required: true
          min: 0
        width: half
      - id: deposit_scheme_name
        label: "Deposit protection scheme"
        inputType: select
        options:
          - "DPS"
          - "MyDeposits"
          - "TDS"
          - "Other"
        validation:
          required: true
        width: half
      - id: deposit_paid_date
        label: "Date deposit will be paid"
        inputType: date
        width: half
      - id: deposit_protection_date
        label: "Date you will protect the deposit"
        inputType: date
        width: half
      - id: deposit_already_protected
        label: "Is the deposit already protected?"
        inputType: yes_no
        width: half
      - id: deposit_reference_number
        label: "Deposit protection reference number (if already protected)"
        inputType: text
        placeholder: "Reference from scheme"
        width: half
    maps_to:
      - deposit_amount
      - deposit_scheme_name
      - deposit_paid_date
      - deposit_protection_date
      - deposit.already_protected
      - deposit.reference_number

  - id: prescribed_information_served
    section: Deposit
    question: "Prescribed information compliance"
    inputType: yes_no
    helperText: "Statutory requirement: you must give the tenant the prescribed deposit information within 30 days of receiving the deposit. If you do not, a court can order you to repay or protect the deposit and pay compensation of up to 3 times the deposit. Keep evidence that this was done."
    validation:
      required: true
    maps_to:
      - deposit.prescribed_information_served

  - id: prescribed_information_date
    section: Deposit
    question: "When was/will prescribed information be served?"
    inputType: date
    helperText: "Must be within 30 days of receiving the deposit. Keep this date for compliance records."
    dependsOn:
      questionId: prescribed_information_served
      value: true
    validation:
      required: true
    maps_to:
      - deposit.prescribed_information_date

  # 7. Bills & utilities
  - id: bills_utilities
    section: Bills & Utilities
    question: "Who pays which bills?"
    inputType: group
    helperText: "We include this in the tenant responsibilities section."
    fields:
      - id: council_tax_responsibility
        label: "Council tax"
        inputType: select
        options:
          - "Tenant"
          - "Landlord"
          - "Included in rent"
        validation:
          required: true
        width: third
      - id: utilities_responsibility
        label: "Gas/Electric/Water"
        inputType: select
        options:
          - "Tenant"
          - "Landlord"
          - "Included in rent"
        validation:
          required: true
        width: third
      - id: internet_responsibility
        label: "Internet/Broadband"
        inputType: select
        options:
          - "Tenant"
          - "Landlord"
          - "Included in rent"
        validation:
          required: true
        width: third
    maps_to:
      - council_tax_responsibility
      - utilities_responsibility
      - internet_responsibility

  - id: meter_readings
    section: Bills & Utilities
    question: "Meter readings and utility accounts"
    inputType: group
    helperText: "Record start readings and transfer arrangements."
    fields:
      - id: meter_reading_gas
        label: "Gas meter reading (start)"
        inputType: text
        placeholder: "e.g., 12345"
        width: half
      - id: meter_reading_electric
        label: "Electric meter reading (start)"
        inputType: text
        placeholder: "e.g., 67890"
        width: half
      - id: meter_reading_water
        label: "Water meter reading (start, if applicable)"
        inputType: text
        placeholder: "e.g., 11223"
        width: half
      - id: utility_transfer_responsibility
        label: "Who arranges utility account transfers?"
        inputType: select
        options:
          - "Tenant"
          - "Landlord"
          - "Agent"
        validation:
          required: true
        width: half
    maps_to:
      - meter_reading_gas
      - meter_reading_electric
      - meter_reading_water
      - utility_transfer_responsibility

  # 8. Safety & legal compliance
  - id: safety_compliance
    section: Safety & Compliance
    question: "Certificates and legal pack items"
    inputType: group
    helperText: "These drive the legal validity summary. Certificate dates are critical for compliance verification."
    fields:
      - id: epc_rating
        label: "EPC rating"
        inputType: select
        options:
          - "A"
          - "B"
          - "C"
          - "D"
          - "E"
          - "F"
          - "G"
        validation:
          required: true
        width: half
      - id: epc_certificate_date
        label: "EPC certificate date"
        inputType: date
        helperText: "EPCs are valid for 10 years from issue date"
        validation:
          required: true
        width: half
      - id: right_to_rent_check_date
        label: "Date right-to-rent checks completed (England only)"
        inputType: date
        helperText: "MANDATORY: Must be completed BEFORE the tenancy starts"
        validation:
          required: true
        width: half
      - id: gas_safety_certificate
        label: "Current gas safety certificate provided?"
        inputType: yes_no
        validation:
          required: true
        width: half
      - id: gas_safety_certificate_date
        label: "Gas safety certificate date"
        inputType: date
        helperText: "Gas certificates are valid for 12 months from issue date"
        dependsOn:
          questionId: gas_safety_certificate
          value: true
        validation:
          required: true
        width: half
      - id: gas_safety_certificate_expiry
        label: "Gas safety certificate expiry"
        inputType: date
        helperText: "Enter the expiry date shown on the certificate"
        dependsOn:
          questionId: gas_safety_certificate
          value: true
        validation:
          required: true
        width: half
      - id: electrical_safety_certificate
        label: "Electrical safety (EICR) provided?"
        inputType: yes_no
        helperText: "MANDATORY since April 2020: EICR required for all new tenancies"
        validation:
          required: true
        width: half
      - id: eicr_certificate_date
        label: "EICR certificate date"
        inputType: date
        helperText: "EICRs are typically valid for 5 years"
        dependsOn:
          questionId: electrical_safety_certificate
          value: true
        validation:
          required: true
        width: half
      - id: eicr_next_inspection_date
        label: "EICR next inspection due"
        inputType: date
        helperText: "Date shown on certificate for next inspection"
        dependsOn:
          questionId: electrical_safety_certificate
          value: true
        width: half
      - id: smoke_alarms_fitted
        label: "Smoke alarms fitted and tested?"
        inputType: yes_no
        validation:
          required: true
        width: half
      - id: carbon_monoxide_alarms
        label: "CO alarms where required?"
        inputType: yes_no
        validation:
          required: true
        width: half
      - id: how_to_rent_guide_provided
        label: "England written information or government guidance recorded? (new agreements)"
        inputType: yes_no
        defaultValue: false
        helperText: "Record whether you have given any England written information or government guidance you plan to rely on for this new tenancy, and keep proof of delivery on file."
        dependsOn:
          questionId: england_tenancy_purpose
          value: "new_agreement"
        validation:
          required: true
        width: half
      - id: how_to_rent_guide_date
        label: "Date written information or guidance provided"
        inputType: date
        helperText: "Record the date you gave the information or guidance for the tenancy file."
        dependsOn:
          questionId: how_to_rent_guide_provided
          value: true
        validation:
          required: true
        width: half
      - id: england_rent_in_advance_compliant
        label: "Will you avoid asking for more than one month's rent in advance? (new agreements)"
        inputType: yes_no
        helperText: "For a new England tenancy from 1 May 2026, do not require more than one month's rent in advance."
        dependsOn:
          questionId: england_tenancy_purpose
          value: "new_agreement"
        validation:
          required: true
        width: half
      - id: england_no_bidding_confirmed
        label: "Will you avoid inviting or accepting rental bids above the advertised rent? (new agreements)"
        inputType: yes_no
        helperText: "For a new England tenancy from 1 May 2026, keep the advertised rent fixed and do not ask tenants to outbid each other."
        dependsOn:
          questionId: england_tenancy_purpose
          value: "new_agreement"
        validation:
          required: true
        width: half
